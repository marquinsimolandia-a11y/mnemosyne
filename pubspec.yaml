name: mnemosyne
description: "Mnemosyne — AI Companion powered by Gemini. Cyberpunk Glassmorphism."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: 2.5.1
  riverpod_annotation: 2.3.5

  # Navigation
  go_router: 13.2.0

  # Google Fonts
  google_fonts: 8.0.2

  # AI
  google_generative_ai: 0.4.3

  # Database
  sqflite: 2.4.2
  path: any

  # Crypto / Security
  crypto: 3.0.3

  # Environment / Config
  flutter_dotenv: 5.1.0

  # Permissions
  permission_handler: 11.3.1

  # Voice / Audio
  speech_to_text: 7.3.0
  flutter_sound: 9.30.0

  # File handling
  file_picker: 10.3.10
  path_provider: 2.1.3
  open_file: 3.5.7

  # Image / Media
  image_picker: 1.1.2

  # Icons
  lucide_icons: 0.257.0

  # Utils
  uuid: 4.3.3

  # UI extras
  flutter_animate: 4.5.0
  shimmer: 3.0.0
  lottie: 3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.2
  build_runner: 2.4.9
  riverpod_generator: 2.4.0

flutter:
  uses-material-design: true

  assets:
    - .env
