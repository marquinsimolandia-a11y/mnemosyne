name: Build APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
      
      - name: Create .env file
        run: echo "GEMINI_API_KEY=AIzaSyCUHCEDrl--UgTqaxVvg6zesr2uoWJXTBQ" > .env
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        env:`n          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx1536m"`n        run: flutter build apk --release --no-shrink
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx3g"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mnemosyne-apk
          path: build/app/outputs/flutter-apk/app-release.apk
